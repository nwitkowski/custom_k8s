apiVersion: v1
kind: Pod
metadata: { name: secret-vol-demo, namespace: lab05-$STUDENT_NAME }
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "ls -lL /etc/db-creds/ && sleep 3600"]
      volumeMounts:
        - { name: db-creds, mountPath: /etc/db-creds, readOnly: true }
  volumes:
    - name: db-creds
      secret: { secretName: db-credentials, defaultMode: 0400 }
  restartPolicy: Never
