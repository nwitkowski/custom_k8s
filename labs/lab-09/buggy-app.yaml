apiVersion: apps/v1
kind: Deployment
metadata: { name: buggy-app, namespace: obs-lab-$STUDENT_NAME }
spec:
  replicas: 1
  selector:
    matchLabels: { app: buggy-app }
  template:
    metadata: { labels: { app: buggy-app } }
    spec:
      containers:
      - name: app
        image: busybox
        # Runs briefly, then allocates memory without bound. The container
        # exceeds its 32Mi limit and the kernel OOM-killer terminates it
        # (exit 137 / reason=OOMKilled), driving a real CrashLoopBackOff.
        command: ['sh', '-c', 'echo "Starting app..."; sleep $((RANDOM % 10 + 5)); echo "Allocating memory beyond limit..."; tail /dev/zero']
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi
