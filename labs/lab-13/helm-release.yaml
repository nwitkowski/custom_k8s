apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lab-podinfo-$STUDENT_NAME
  namespace: flux-lab-$STUDENT_NAME
spec:
  interval: 15m
  # Enable drift correction so Flux reverts manual changes (e.g. a kubectl
  # scale) back to the Helm-rendered state on the next reconcile. Without this,
  # helm-controller only re-runs on chart/values changes and leaves live drift
  # in place — Step 9's "Flux reverts replicas to 2" depends on this.
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: podinfo
      version: ">=6.0.0 <7.0.0"
      sourceRef:
        kind: HelmRepository
        name: podinfo-$STUDENT_NAME
        namespace: flux-system
  values:
    replicaCount: 2
    service: { type: ClusterIP }
  install:
    remediation: { retries: 3 }
  upgrade:
    remediation: { retries: 3, strategy: rollback }
